<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stencil Components - Vanilla JS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
  </style>
  
  <!-- Load the Stencil library bundle -->
  <script type="module" src="../stencil-library/dist/stencil-library/stencil-library.esm.js"></script>
</head>
<body>
  <h1>Vanilla HTML/JS Integration</h1>
  <p>This demonstrates using Stencil components without any framework.</p>
  
  <!-- Use your Stencil component -->
  <my-component first="Anis" last="This is vanilla HTML/JS"></my-component>
  
</body>
</html>
